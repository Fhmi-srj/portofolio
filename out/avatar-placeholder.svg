<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Background gradient matching site bg -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#EBF4FF"/>
      <stop offset="100%" stop-color="#F8FBFF"/>
    </radialGradient>
    <radialGradient id="avatarGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
    <radialGradient id="fadeOut" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </radialGradient>
    <!-- Circuit-board pattern -->
    <pattern id="circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M10 10 h10 v10 h10" stroke="#2563EB" stroke-width="0.8" fill="none" opacity="0.12"/>
      <circle cx="10" cy="10" r="2" fill="#2563EB" opacity="0.15"/>
      <circle cx="30" cy="20" r="1.5" fill="#2563EB" opacity="0.15"/>
      <path d="M40 0 v15 h15" stroke="#2563EB" stroke-width="0.8" fill="none" opacity="0.1"/>
      <path d="M0 40 h20 v-10" stroke="#2563EB" stroke-width="0.8" fill="none" opacity="0.1"/>
      <circle cx="40" cy="40" r="2" fill="#2563EB" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="400" height="500" fill="url(#bgGrad)"/>
  <rect width="400" height="500" fill="url(#circuit)"/>

  <!-- Body / shirt -->
  <ellipse cx="200" cy="520" rx="140" ry="90" fill="#1E3A5F"/>
  <!-- Neck -->
  <rect x="176" y="330" width="48" height="60" rx="12" fill="#D4956A"/>
  <!-- Collar -->
  <path d="M176 355 L200 395 L224 355" fill="#1E3A5F"/>

  <!-- Head -->
  <ellipse cx="200" cy="270" rx="78" ry="88" fill="#D4956A"/>

  <!-- Hair -->
  <ellipse cx="200" cy="195" rx="82" ry="50" fill="#1A1108"/>
  <ellipse cx="200" cy="210" rx="82" ry="38" fill="#1A1108"/>
  <!-- Side hair -->
  <ellipse cx="130" cy="250" rx="22" ry="40" fill="#1A1108"/>
  <ellipse cx="270" cy="250" rx="22" ry="40" fill="#1A1108"/>

  <!-- Eyes -->
  <ellipse cx="175" cy="268" rx="9" ry="10" fill="#fff"/>
  <ellipse cx="225" cy="268" rx="9" ry="10" fill="#fff"/>
  <ellipse cx="176" cy="269" rx="6" ry="7" fill="#3D2000"/>
  <ellipse cx="226" cy="269" rx="6" ry="7" fill="#3D2000"/>
  <circle cx="178" cy="266" r="2" fill="white"/>
  <circle cx="228" cy="266" r="2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M162 252 Q175 246 188 250" stroke="#1A1108" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M212 250 Q225 246 238 252" stroke="#1A1108" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M196 278 Q200 298 204 278" stroke="#B87A52" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Mouth / smile -->
  <path d="M183 308 Q200 322 217 308" stroke="#9B5E3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="122" cy="275" rx="14" ry="18" fill="#D4956A"/>
  <ellipse cx="278" cy="275" rx="14" ry="18" fill="#D4956A"/>

  <!-- Floating badge - top right -->
  <rect x="280" y="60" width="100" height="42" rx="12" fill="white" opacity="0.9" filter="url(#shadow)"/>
  <circle cx="298" cy="81" r="6" fill="#22C55E"/>
  <rect x="310" y="74" width="60" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="310" y="87" width="45" height="6" rx="3" fill="#EFF6FF"/>

  <!-- Floating badge - bottom left -->
  <rect x="20" y="380" width="90" height="38" rx="10" fill="white" opacity="0.85"/>
  <rect x="32" y="392" width="50" height="7" rx="3" fill="#BFDBFE"/>
  <rect x="32" y="404" width="36" height="5" rx="2.5" fill="#EFF6FF"/>

  <!-- Code snippet decoration -->
  <rect x="285" y="340" width="96" height="70" rx="10" fill="white" opacity="0.8"/>
  <rect x="296" y="352" width="70" height="5" rx="2.5" fill="#2563EB" opacity="0.4"/>
  <rect x="296" y="362" width="55" height="5" rx="2.5" fill="#64748B" opacity="0.3"/>
  <rect x="305" y="372" width="48" height="5" rx="2.5" fill="#64748B" opacity="0.3"/>
  <rect x="305" y="382" width="36" height="5" rx="2.5" fill="#2563EB" opacity="0.3"/>
  <rect x="296" y="392" width="42" height="5" rx="2.5" fill="#64748B" opacity="0.25"/>

  <!-- Fade overlay to blend edges with background -->
  <rect width="400" height="500" fill="url(#fadeOut)"/>
</svg>
